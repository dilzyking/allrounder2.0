<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>matchdekho</title>
  <style>
    /* ---------- RESET & BASE ---------- */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0b0d0f;
      --green: #7dffb3;
      --white: #ffffff;
      --golden: #f5c518;
      --golden-dark: #d4a800;
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg-primary);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      position: relative;
    }

    /* ---------- HEADER ---------- */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      width: 100%;
      padding: clamp(0.3rem, 1.2vw, 0.7rem) clamp(0.8rem, 4vw, 3rem);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: transparent;
      z-index: 1000;
      border-bottom: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ---------- LOGO ---------- */
    .logo {
      text-decoration: none;
      font-size: clamp(0.85rem, 2.5vw, 1.5rem);
      font-weight: 700;
      letter-spacing: clamp(-0.01em, -0.03em, -0.05em);
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      transition: transform 0.2s ease;
      z-index: 1001;
      font-family: 'Inter', system-ui, sans-serif;
    }

    .logo:hover {
      transform: scale(1.02);
    }

    .logo .match {
      color: var(--green);
      text-shadow: 0 0 clamp(15px, 3vw, 40px) rgba(125, 255, 179, 0.15);
    }

    .logo .dekho {
      color: var(--white);
      text-shadow: 0 0 clamp(8px, 1.5vw, 25px) rgba(255, 255, 255, 0.05);
    }

    /* ---------- HEADER NAV - DESKTOP ---------- */
    .header-nav {
      display: flex;
      align-items: center;
      gap: clamp(0.5rem, 1.5vw, 1.5rem);
    }

    .header-nav a {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: clamp(0.6rem, 1.2vw, 0.9rem);
      font-weight: 500;
      transition: color 0.3s ease;
      letter-spacing: 0.02em;
      font-family: 'Inter', system-ui, sans-serif;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }

    .header-nav a:hover {
      color: #ffffff;
    }

    .header-nav .sign-in {
      color: #ffffff;
      font-weight: 600;
    }

    .header-nav .subscribe {
      background: var(--golden);
      color: #0b0d0f;
      padding: clamp(0.2rem, 0.5vw, 0.5rem) clamp(0.6rem, 1.5vw, 1.2rem);
      border-radius: clamp(20px, 3vw, 40px);
      font-weight: 700;
      font-size: clamp(0.55rem, 1vw, 0.8rem);
      transition: all 0.3s ease;
      text-shadow: none;
    }

    .header-nav .subscribe:hover {
      transform: scale(1.05);
      background: #e6b800;
    }

    /* ---------- HAMBURGER MENU (MOBILE ONLY) ---------- */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: clamp(4px, 0.5vw, 6px);
      cursor: pointer;
      padding: clamp(4px, 0.5vw, 8px);
      z-index: 1001;
      background: transparent;
      border: none;
      position: relative;
    }

    .hamburger span {
      display: block;
      width: clamp(24px, 3vw, 30px);
      height: clamp(2.5px, 0.3vw, 3.5px);
      background: #ffffff;
      border-radius: 2px;
      transition: all 0.3s ease;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }

    .hamburger.active span:nth-child(1) {
      transform: rotate(45deg) translate(clamp(5px, 0.6vw, 7px), clamp(5px, 0.6vw, 7px));
    }

    .hamburger.active span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active span:nth-child(3) {
      transform: rotate(-45deg) translate(clamp(5px, 0.6vw, 7px), clamp(-5px, -0.6vw, -7px));
    }

    /* ---------- MOBILE MENU OVERLAY ---------- */
    .mobile-menu {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(11, 13, 15, 0.98);
      z-index: 999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(1.2rem, 3vh, 2.5rem);
      padding: 2rem;
      animation: fadeIn 0.3s ease;
    }

    .mobile-menu.active {
      display: flex;
    }

    .mobile-menu a {
      color: #ffffff;
      text-decoration: none;
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      font-weight: 500;
      transition: color 0.3s ease;
      letter-spacing: 0.05em;
      font-family: 'Inter', system-ui, sans-serif;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
    }

    .mobile-menu a:hover {
      color: var(--golden);
    }

    .mobile-menu .subscribe-mobile {
      background: var(--golden);
      color: #0b0d0f;
      padding: clamp(0.6rem, 1.5vw, 1rem) clamp(1.5rem, 4vw, 2.5rem);
      border-radius: clamp(30px, 4vw, 50px);
      font-weight: 700;
      font-size: clamp(1rem, 3vw, 1.4rem);
      margin-top: clamp(0.5rem, 1vh, 1rem);
      text-shadow: none;
    }

    .mobile-menu .subscribe-mobile:hover {
      background: #e6b800;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* ---------- POSTER WRAPPER - CLICKABLE ---------- */
    .poster-wrapper {
      position: relative;
      width: 100%;
      margin-top: 0;
      z-index: 1;
      overflow: hidden;
      cursor: pointer;
    }

    .poster-section {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      padding: 0;
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg-primary);
    }

    .poster-image {
      width: 100%;
      height: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      object-fit: cover;
      display: block;
      margin: 0;
      padding: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }

    /* ---------- GRADIENTS ---------- */
    .gradient-left {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: clamp(35%, 50%, 65%);
      background: linear-gradient(
        to right,
        #0b0d0f 0%,
        #0b0d0f 10%,
        rgba(11, 13, 15, 0.85) 25%,
        rgba(11, 13, 15, 0.5) 50%,
        rgba(11, 13, 15, 0.15) 75%,
        transparent 100%
      );
      pointer-events: none;
      z-index: 2;
    }

    .gradient-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      height: clamp(35%, 50%, 65%);
      background: linear-gradient(
        to top,
        #0b0d0f 0%,
        #0b0d0f 15%,
        rgba(11, 13, 15, 0.85) 30%,
        rgba(11, 13, 15, 0.5) 50%,
        rgba(11, 13, 15, 0.2) 70%,
        transparent 100%
      );
      pointer-events: none;
      z-index: 2;
    }

    /* ---------- MATCH DETAILS OVERLAY ---------- */
    .match-details {
      position: absolute;
      bottom: clamp(8%, 12vh, 18%);
      left: clamp(3%, 5vw, 8%);
      z-index: 10;
      max-width: clamp(320px, 55vw, 650px);
      animation: fadeInUp 0.8s ease-out;
      pointer-events: none;
    }

    /* Match Title - WITH SHADOW */
    .match-title {
      font-size: clamp(0.7rem, 1.2vw, 1rem);
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: clamp(0.25rem, 0.5vw, 0.6rem);
      font-weight: 600;
      font-family: 'Inter', system-ui, sans-serif;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7), 0 0 30px rgba(0, 0, 0, 0.3);
    }

    /* ---------- TEAMS ROW - FLAG ABOVE NAME, SCORE CENTERED ---------- */
    .teams-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(0.8rem, 2vw, 2rem);
      margin-bottom: clamp(0.3rem, 0.6vw, 0.8rem);
    }

    .team {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0.15rem, 0.3vw, 0.4rem);
    }

    .team-flag {
      width: clamp(55px, 7vw, 100px);
      height: clamp(38px, 4.8vw, 65px);
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      flex-shrink: 0;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    /* Team name - WITH SHADOW */
    .team-name {
      font-size: clamp(0.7rem, 1.2vw, 1rem);
      font-weight: 600;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: 0.05em;
      text-align: center;
      font-family: 'Inter', system-ui, sans-serif;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8), 0 0 30px rgba(0, 0, 0, 0.4);
    }

    /* Score - WITH SHADOW */
    .vs-score {
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 0.05em;
      padding: 0 clamp(0.3rem, 0.8vw, 1rem);
      font-family: 'Inter', system-ui, sans-serif;
      line-height: 1;
      margin-top: clamp(0.3rem, 0.6vw, 1rem);
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.9), 0 0 40px rgba(0, 0, 0, 0.5);
    }

    /* Match Info - WITH SHADOW */
    .match-info {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: clamp(0.3rem, 0.8vw, 1rem);
      margin-bottom: clamp(0.3rem, 0.6vw, 0.8rem);
    }

    .match-info .tag {
      font-size: clamp(0.6rem, 1vw, 0.85rem);
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      font-family: 'Inter', system-ui, sans-serif;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
    }

    .match-info .date,
    .match-info .time,
    .match-info .venue {
      font-size: clamp(0.6rem, 1vw, 0.85rem);
      color: rgba(255, 255, 255, 0.7);
      font-weight: 400;
      font-family: 'Inter', system-ui, sans-serif;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
    }

    .match-info .separator {
      color: rgba(255, 255, 255, 0.2);
    }

    /* Badges - WITH SHADOW */
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(0.3rem, 0.6vw, 0.8rem);
      margin-bottom: clamp(0.4rem, 0.8vw, 1rem);
    }

    .badge {
      padding: clamp(0.2rem, 0.4vw, 0.5rem) clamp(0.5rem, 1vw, 1.2rem);
      border-radius: clamp(14px, 2vw, 22px);
      font-size: clamp(0.5rem, 0.8vw, 0.75rem);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-family: 'Inter', system-ui, sans-serif;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }

    .badge-fulltime {
      background: rgba(245, 197, 24, 0.15);
      color: var(--golden);
      border-color: rgba(245, 197, 24, 0.2);
    }

    .badge-4k {
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.5);
    }

    .badge-hdr {
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.5);
    }

    .badge-fanzone {
      background: rgba(125, 255, 179, 0.08);
      color: var(--green);
      border-color: rgba(125, 255, 179, 0.15);
    }

    /* ---------- ACTION BUTTONS ---------- */
    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: clamp(0.5rem, 1vw, 1.2rem);
      margin-top: clamp(0.3rem, 0.6vw, 0.8rem);
      pointer-events: auto;
      position: relative;
      z-index: 11;
    }

    /* WATCH BUTTON - ROUND LEFT, STRAIGHT RIGHT */
    .watch-btn {
      display: inline-flex;
      align-items: center;
      gap: clamp(0.4rem, 0.8vw, 0.8rem);
      padding: clamp(0.6rem, 1.2vw, 1.2rem) clamp(1.2rem, 3vw, 3rem);
      background: linear-gradient(135deg, #f5c518 0%, #e6b800 50%, #d4a800 100%);
      color: #0b0d0f;
      font-size: clamp(0.85rem, 1.6vw, 1.3rem);
      font-weight: 700;
      font-family: 'Inter', system-ui, sans-serif;
      border: clamp(2px, 0.25vw, 4px) solid #0b0d0f;
      border-radius: 0 clamp(30px, 4vw, 50px) clamp(30px, 4vw, 50px) 0;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 
        0 clamp(3px, 0.8vw, 10px) clamp(15px, 2.5vw, 30px) rgba(245, 197, 24, 0.25),
        0 clamp(2px, 0.4vw, 5px) clamp(8px, 1.5vw, 20px) rgba(0, 0, 0, 0.3),
        inset 0 clamp(1px, 0.2vw, 2px) clamp(2px, 0.4vw, 5px) rgba(255, 255, 255, 0.3);
      position: relative;
      overflow: hidden;
      border-left: clamp(2px, 0.25vw, 4px) solid #0b0d0f;
      text-shadow: none;
    }

    .watch-btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(
        circle at center,
        rgba(255, 255, 255, 0.15) 0%,
        transparent 60%
      );
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .watch-btn:hover {
      transform: scale(1.05) translateY(clamp(-2px, -0.3vh, -4px));
      box-shadow: 
        0 clamp(6px, 1.2vw, 16px) clamp(25px, 4vw, 50px) rgba(245, 197, 24, 0.35),
        0 clamp(3px, 0.6vw, 8px) clamp(12px, 2.5vw, 30px) rgba(0, 0, 0, 0.4),
        inset 0 clamp(1px, 0.2vw, 2px) clamp(2px, 0.4vw, 5px) rgba(255, 255, 255, 0.4);
    }

    .watch-btn:hover::before {
      opacity: 1;
    }

    .watch-btn:active {
      transform: scale(0.95);
    }

    .watch-btn .icon {
      font-size: clamp(0.9rem, 1.6vw, 1.5rem);
      line-height: 1;
    }

    /* + My TOD Button - WITH SHADOW */
    .btn-mytod {
      display: inline-flex;
      align-items: center;
      gap: clamp(0.2rem, 0.4vw, 0.4rem);
      padding: clamp(0.4rem, 0.8vw, 0.8rem) clamp(0.8rem, 1.5vw, 1.8rem);
      background: transparent;
      color: #ffffff;
      font-size: clamp(0.65rem, 1.2vw, 0.95rem);
      font-weight: 600;
      font-family: 'Inter', system-ui, sans-serif;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: clamp(20px, 2.5vw, 35px);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
    }

    .btn-mytod:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.3);
    }

    /* ---------- ANIMATIONS ---------- */
    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(clamp(20px, 3vh, 40px));
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ---------- GLASS CLOUDS ---------- */
    .glass-cloud {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(clamp(30px, 6vw, 60px));
      will-change: transform, opacity;
    }

    .cloud-1 {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(80vw, 700px);
      height: min(50vh, 400px);
      background: radial-gradient(
        ellipse at center,
        rgba(125, 255, 179, 0.05) 0%,
        rgba(255, 255, 255, 0.025) 40%,
        transparent 70%
      );
      animation: pulse 4s ease-in-out infinite;
    }

    .cloud-2 {
      top: clamp(10%, 15vh, 25%);
      left: clamp(5%, 8vw, 15%);
      width: clamp(150px, 25vw, 350px);
      height: clamp(100px, 18vh, 250px);
      background: radial-gradient(
        ellipse at center,
        rgba(125, 255, 179, 0.035) 0%,
        rgba(255, 255, 255, 0.02) 30%,
        transparent 70%
      );
      animation: float1 8s ease-in-out infinite;
    }

    .cloud-3 {
      bottom: clamp(10%, 12vh, 20%);
      right: clamp(3%, 5vw, 12%);
      width: clamp(180px, 28vw, 400px);
      height: clamp(120px, 20vh, 280px);
      background: radial-gradient(
        ellipse at center,
        rgba(125, 255, 179, 0.03) 0%,
        rgba(255, 255, 255, 0.015) 30%,
        transparent 70%
      );
      animation: float2 10s ease-in-out infinite reverse;
    }

    .cloud-4 {
      top: clamp(60%, 65vh, 75%);
      left: clamp(2%, 3vw, 8%);
      width: clamp(100px, 15vw, 200px);
      height: clamp(70px, 10vh, 150px);
      background: radial-gradient(
        ellipse at center,
        rgba(125, 255, 179, 0.02) 0%,
        rgba(255, 255, 255, 0.01) 30%,
        transparent 70%
      );
      animation: float3 12s ease-in-out infinite 2s;
      filter: blur(clamp(40px, 5vw, 70px));
    }

    /* ---------- ANIMATIONS ---------- */
    @keyframes pulse {
      0%, 100% {
        opacity: 0.5;
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.08);
      }
    }

    @keyframes float1 {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      33% {
        transform: translate(clamp(10px, 2vw, 30px), clamp(-10px, -2vh, -25px)) scale(1.02);
      }
      66% {
        transform: translate(clamp(-5px, -1vw, -15px), clamp(5px, 1vh, 15px)) scale(0.98);
      }
    }

    @keyframes float2 {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      50% {
        transform: translate(clamp(-15px, -3vw, -40px), clamp(-12px, -2.5vh, -30px)) scale(1.05);
      }
    }

    @keyframes float3 {
      0%, 100% {
        transform: translate(0, 0) rotate(0deg);
      }
      50% {
        transform: translate(clamp(20px, 4vw, 50px), clamp(8px, 1.5vh, 20px)) rotate(5deg);
      }
    }

    /* ---------- MAIN ---------- */
    main {
      flex: 1;
      min-height: 100vh;
      min-height: 100dvh;
      width: 100%;
      position: relative;
      z-index: 1;
      background: var(--bg-primary);
    }

    /* ============================================================ */
    /* ========== RESPONSIVE ========== */
    /* ============================================================ */

    /* ----- MOBILE: PORTRAIT (HAMBURGER + CENTER LOGO) ----- */
    @media (orientation: portrait) and (max-width: 768px) {
      header {
        padding: clamp(0.3rem, 1.2vw, 0.5rem) clamp(0.8rem, 3vw, 1.2rem);
        justify-content: space-between;
        position: fixed;
      }

      .logo {
        font-size: clamp(1.2rem, 4.5vw, 1.8rem);
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
      }

      .logo:hover {
        transform: translateX(-50%) scale(1.02);
      }

      .header-nav {
        display: none;
      }

      .hamburger {
        display: flex;
        position: relative;
        margin-left: 0;
        padding: clamp(4px, 0.6vw, 8px);
        gap: clamp(4px, 0.5vw, 6px);
      }

      .hamburger span {
        width: clamp(22px, 3vw, 28px);
        height: clamp(2.5px, 0.3vw, 3px);
      }

      .poster-section {
        min-height: 100vh;
        min-height: 100dvh;
      }

      .poster-image {
        min-height: 100vh;
        min-height: 100dvh;
        object-fit: cover;
        width: 100%;
      }

      .gradient-left {
        display: none;
      }

      .gradient-overlay {
        height: clamp(45%, 60%, 75%);
      }

      .match-details {
        bottom: clamp(10%, 14vh, 20%);
        left: clamp(4%, 6vw, 8%);
        max-width: clamp(300px, 80vw, 450px);
      }

      .match-title {
        font-size: clamp(0.6rem, 1.2vw, 0.8rem);
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8), 0 0 30px rgba(0, 0, 0, 0.4);
      }

      .team-flag {
        width: clamp(48px, 6.5vw, 65px);
        height: clamp(34px, 4.5vw, 45px);
      }

      .team-name {
        font-size: clamp(0.65rem, 1.2vw, 0.85rem);
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.9), 0 0 30px rgba(0, 0, 0, 0.5);
      }

      .vs-score {

    // ====== HAMBURGER MENU TOGGLE ======
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');

    hamburger.addEventListener('click', function(e) {
      e.stopPropagation();
      this.classList.toggle('active');
      mobileMenu.classList.toggle('active');
      document.body.style.overflow = mobileMenu.classList.contains('active') ? 'hidden' : '';
    });

    // Close menu when clicking a link
    document.querySelectorAll('.mobile-menu a').forEach(link => {
      link.addEventListener('click', function() {
        hamburger.classList.remove('active');
        mobileMenu.classList.remove('active');
        document.body.style.overflow = '';
      });
    });

    // Close menu on escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && mobileMenu.classList.contains('active')) {
        hamburger.classList.remove('active');
        mobileMenu.classList.remove('active');
        document.body.style.overflow = '';
      }
    });

    // Close menu when clicking outside
    document.addEventListener('click', function(e) {
      if (mobileMenu.classList.contains('active') && 
          !mobileMenu.contains(e.target) && 
          !hamburger.contains(e.target)) {
        hamburger.classList.remove('active');
        mobileMenu.classList.remove('active');
        document.body.style.overflow = '';
      }
    });

    // ====== POSTER CLICK - OPEN SAME PAGE ======
    const posterWrapper = document.getElementById('posterWrapper');
    posterWrapper.addEventListener('click', function(e) {
      // Don't trigger if clicking on watch button or mytod button
      if (e.target.closest('.watch-btn') || e.target.closest('.btn-mytod')) {
        return;
      }
      // Open the same page (refresh or navigate)
      window.location.href = window.location.href;
    });

    // ====== WATCH BUTTON CLICK - OPEN SAME PAGE ======
    const watchBtn = document.getElementById('watchBtn');
    watchBtn.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      // Open the same page
      window.location.href = window.location.href;
    });

    // ====== MY TOD BUTTON ======
    document.querySelector('.btn-mytod').addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      // You can change this to any action
      alert('Added to My TOD!');
    });
  </script>

</body>
</html>
